<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mercado App - Smart Cart</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 24px;
            padding: 40px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
            text-align: center;
        }
        .logo {
            font-size: 32px;
            font-weight: 800;
            color: #1a73e8;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 4px;
        }
        .logo i { font-size: 40px; }
        .subtitle { color: #5f6368; margin-bottom: 24px; font-size: 14px; }
        .status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 16px;
        }
        .status.active { background: #e6f4ea; color: #1e7e34; }
        .qr-box {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 24px;
            margin: 12px 0 16px 0;
            border: 2px dashed #dadce0;
        }
        .qr-box img {
            max-width: 200px;
            width: 100%;
            height: auto;
        }
        .code-display {
            font-size: 22px;
            font-weight: 700;
            color: #1a73e8;
            background: #e8f0fe;
            padding: 8px 20px;
            border-radius: 8px;
            display: inline-block;
            margin: 12px 0 8px 0;
            letter-spacing: 3px;
            font-family: monospace;
        }
        .btn {
            background: #1a73e8;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn:hover { background: #1557b0; transform: scale(1.02); }
        .btn-secondary { background: #f1f3f4; color: #3c4043; }
        .btn-secondary:hover { background: #e8eaed; }
        .btn-success { background: #34a853; }
        .btn-success:hover { background: #2d9249; }
        .info {
            color: #5f6368;
            font-size: 14px;
            margin: 16px 0;
            line-height: 1.6;
        }
        hr { margin: 20px 0; border: none; border-top: 1px solid #e8eaed; }
        .carrinhos-title {
            font-size: 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: #3c4043;
        }
        .carrinhos-list { margin: 12px 0; text-align: left; }
        .carrinho-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 6px;
            font-size: 14px;
        }
        .carrinho-item .badge {
            background: #1a73e8;
            color: white;
            border-radius: 50px;
            padding: 2px 10px;
            font-size: 11px;
            font-weight: 600;
        }
        .carrinho-item .valor { color: #1a73e8; font-weight: 700; }
        .carrinho-item .empty { color: #5f6368; font-style: italic; width: 100%; text-align: center; }
        .actions {
            display: flex;
            gap: 8px;
            margin-top: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .actions .btn { flex: 1; min-width: 120px; justify-content: center; }
        @media (max-width: 480px) {
            .container { padding: 24px 16px; }
            .qr-box img { max-width: 150px; }
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .container { animation: fadeIn 0.4s ease; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <i class="fas fa-store"></i>
            <span>SmartCart</span>
        </div>
        <p class="subtitle">App do Supermercado</p>
        
        <div class="status active">
            <i class="fas fa-circle" style="font-size: 10px;"></i>
            Sistema Ativo
        </div>

        <h3 style="margin: 8px 0 4px 0; font-size: 18px;">📱 QR Code para Cliente</h3>
        <p style="color: #5f6368; font-size: 13px; margin-bottom: 8px;">Cliente escaneia este código no carrinho</p>
        
        <div class="qr-box">
            <img id="qrImage" src="" alt="QR Code">
            <div>
                <div class="code-display" id="codigoDisplay">ABC123</div>
            </div>
            <button class="btn" onclick="gerarNovoQR()">
                <i class="fas fa-sync"></i> Gerar Novo QR
            </button>
        </div>

        <div class="info">
            <i class="fas fa-info-circle"></i>
            O cliente escaneia este QR Code no tablet do carrinho para iniciar a compra.
        </div>

        <hr>

        <div class="carrinhos-title">
            <i class="fas fa-shopping-cart"></i>
            Carrinhos Ativos
            <span class="carrinho-count" id="carrinhoCount">(0)</span>
        </div>
        
        <div id="carrinhosList" class="carrinhos-list">
            <div class="carrinho-item">
                <span class="empty"><i class="fas fa-inbox"></i> Nenhum carrinho ativo</span>
            </div>
        </div>

        <div class="actions">
            <button class="btn btn-secondary" onclick="window.location.href='../index.html'">
                <i class="fas fa-arrow-left"></i> Voltar
            </button>
            <button class="btn btn-success" onclick="abrirCarrinhoTeste()">
                <i class="fas fa-plus"></i> Testar Carrinho
            </button>
        </div>
    </div>

    <script>
        let codigoAtual = 'ABC123';
        let carrinhosAtivos = [];
        
        function gerarNovoQR() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let codigo = '';
            for (let i = 0; i < 6; i++) {
                codigo += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            codigoAtual = codigo;
            document.getElementById('codigoDisplay').textContent = codigo;
            const url = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${codigo}`;
            document.getElementById('qrImage').src = url;
            console.log(`📱 Novo QR Code gerado: ${codigo}`);
        }
        
        function atualizarCarrinhos() {
            const container = document.getElementById('carrinhosList');
            const count = document.getElementById('carrinhoCount');
            const nomesProdutos = ['Arroz 5kg', 'Feijão 1kg', 'Leite 1L', 'Café 500g', 'Açúcar 1kg', 'Óleo 900ml'];
            const numCarrinhos = Math.floor(Math.random() * 4) + 1;
            carrinhosAtivos = [];
            
            for (let i = 0; i < numCarrinhos; i++) {
                const numItens = Math.floor(Math.random() * 5) + 1;
                let total = 0;
                for (let j = 0; j < numItens; j++) {
                    total += parseFloat((Math.random() * 20 + 3).toFixed(2));
                }
                carrinhosAtivos.push({
                    id: `#${String(i + 1).padStart(3, '0')}`,
                    itens: numItens,
                    total: total.toFixed(2)
                });
            }
            
            count.textContent = `(${carrinhosAtivos.length})`;
            
            if (carrinhosAtivos.length === 0) {
                container.innerHTML = `<div class="carrinho-item"><span class="empty"><i class="fas fa-inbox"></i> Nenhum carrinho ativo</span></div>`;
                return;
            }
            
            container.innerHTML = carrinhosAtivos.map(c => `
                <div class="carrinho-item">
                    <span>${c.id} <span class="badge">${c.itens} item${c.itens > 1 ? 's' : ''}</span></span>
                    <span class="valor">R$ ${c.total}</span>
                </div>
            `).join('');
        }
        
        function abrirCarrinhoTeste() {
            window.open('../index.html', '_blank');
            const btn = document.querySelector('.btn-success');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-check"></i> Aberto!';
            btn.style.background = '#1a73e8';
            setTimeout(() => { btn.innerHTML = originalText; btn.style.background = ''; }, 2000);
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            console.log('🏪 App do Mercado iniciado!');
            gerarNovoQR();
            atualizarCarrinhos();
            setInterval(atualizarCarrinhos, 8000);
        });
    </script>
</body>
</html>
